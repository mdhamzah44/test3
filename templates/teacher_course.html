<!DOCTYPE html>
<html>
<head>
<title>{{ course.name }}</title>

<style>
body{
  font-family:Poppins;
  padding:20px;
  background:#f1f5f9;
}

h1{color:#2563eb;}

.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.btn-blue{background:#2563eb;color:white;}
.btn-red{background:#ef4444;color:white;}
.btn-yellow{background:#f59e0b;color:white;}

input{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.upcoming{background:#dcfce7;color:#166534;}
.cancelled{background:#fee2e2;color:#991b1b;}
</style>
</head>

<body>

<h1>{{ course.name }}</h1>
<p>{{ course.desc }}</p>

<!-- ================= CLASSES ================= -->
<h2>📅 Classes</h2>

<!-- ADD CLASS -->
<div class="card">
<h3>Add New Class</h3>

<input id="newSubject" placeholder="Subject">
<input type="date" id="newDate">
<input type="time" id="newTime">

<button class="btn-blue" onclick="addClass()">Add Class</button>
</div>

<!-- EXISTING CLASSES -->
{% for c in classes %}
<div class="card">

<span class="badge {{ c.status }}">{{ c.status }}</span>

<br><br>

<input value="{{ c.subject }}" id="subject{{ c.class_id }}">
<input type="date" value="{{ c.date }}" id="date{{ c.class_id }}">
<input type="time" value="{{ c.time }}" id="time{{ c.class_id }}">

<br>

<button class="btn-blue" onclick="updateClass('{{ c.class_id }}')">Update</button>

<button class="btn-yellow" onclick="cancelClass('{{ c.class_id }}')">
Cancel Class
</button>

<button class="btn-red" onclick="deleteClass('{{ c.class_id }}')">
Delete
</button>

</div>
{% endfor %}


<!-- ================= NOTES ================= -->
<h2>📄 Notes</h2>

<form id="noteForm">
<input type="text" id="noteTitle" placeholder="Title">
<input type="file" id="noteFile">
<button class="btn-blue" type="submit">Upload</button>
</form>

<div id="notesList">

{% for n in notes %}
<div class="card">

<a href="{{ n.file_url }}" target="_blank">{{ n.title }}</a>

<br><br>

<input value="{{ n.title }}" id="noteTitle{{ n.note_id }}">

<button class="btn-blue" onclick="updateNote('{{ n.note_id }}')">Edit</button>
<button class="btn-red" onclick="deleteNote('{{ n.note_id }}')">Delete</button>

</div>
{% endfor %}

</div>

<script>

/* ================= ADD CLASS ================= */
function addClass(){

fetch("/add-class",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    course_id:"{{ course.course_id }}",
    subject:document.getElementById("newSubject").value,
    date:document.getElementById("newDate").value,
    time:document.getElementById("newTime").value
})
})
.then(res=>res.json())
.then(()=>{
    alert("Class added");
    location.reload();
});
}


/* ================= UPDATE CLASS ================= */
function updateClass(id){

fetch("/update-class",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    class_id:id,
    subject:document.getElementById("subject"+id).value,
    date:document.getElementById("date"+id).value,
    time:document.getElementById("time"+id).value
})
})
.then(()=>alert("Updated"));
}


/* ================= CANCEL CLASS ================= */
function cancelClass(id){

fetch("/cancel-class/"+id,{
method:"POST"
})
.then(()=>{
    alert("Class cancelled");
    location.reload();
});
}


/* ================= DELETE CLASS ================= */
function deleteClass(id){

if(!confirm("Delete class permanently?")) return;

fetch("/delete-class/"+id,{
method:"DELETE"
})
.then(()=>location.reload());
}


/* ================= NOTES ================= */
document.getElementById("noteForm").addEventListener("submit", function(e){
e.preventDefault();

let formData = new FormData();
formData.append("title", document.getElementById("noteTitle").value);
formData.append("file", document.getElementById("noteFile").files[0]);
formData.append("course_id", "{{ course.course_id }}");

fetch("/upload-note",{method:"POST",body:formData})
.then(res=>res.json())
.then(()=>{
    alert("Uploaded");
    location.reload();
});
});


/* ================= EDIT NOTE ================= */
function updateNote(id){

fetch("/upload-note", {
    method: "POST",
    body: formData
})
.then(res => res.json())
.then(data => {
    if(data.error){
        alert("❌ " + data.error);
        return;
    }

    alert("✅ Uploaded");
    location.reload();
});
}


/* ================= DELETE NOTE ================= */
function deleteNote(id){

if(!confirm("Delete note?")) return;

fetch("/delete-note/"+id,{
method:"DELETE"
})
.then(()=>location.reload());
}

</script>

</body>
</html>
