<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - SmartEdu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:600;
    color:#2563eb;
}

/* NAV LINKS */
.nav-links{
    list-style:none;
    display:flex;
    gap:20px;
}

.nav-links li a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:.3s;
}

.nav-links li a:hover{
    color:#2563eb;
}

/* AUTH BUTTONS */
.auth{
    display:flex;
    gap:10px;
}

.auth .login{
    padding:6px 12px;
    border:1px solid #2563eb;
    background:white;
    color:#2563eb;
    border-radius:6px;
    cursor:pointer;
}

.auth .signup{
    padding:6px 12px;
    background:#2563eb;
    color:white;
    border-radius:6px;
    text-decoration:none;
}

/* MOBILE MENU */
.menu-toggle{
    display:none;
    font-size:22px;
    cursor:pointer;
}

/* BODY */
body{
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding-top:80px;
}

/* REGISTER BOX */
.register-container{
    background:white;
    padding:40px;
    width:380px;
    border-radius:10px;
    box-shadow:0 5px 25px rgba(0,0,0,.1);
    text-align:center;
}

.register-container h2{
    color:#2563eb;
    margin-bottom:20px;
}

/* INPUT */
.register-container input,
.register-container select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTON */
.register-container button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
    transition:.3s;
}

.register-container button:hover{
    background:#1e4fd1;
}

/* LINKS */
.register-links{
    margin-top:15px;
    font-size:14px;
}

.register-links a{
    color:#2563eb;
    text-decoration:none;
    font-weight:500;
}

.register-links a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */
@media(max-width:768px){

    .menu-toggle{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:60px;
        left:0;
        width:100%;
        background:white;
        flex-direction:column;
        align-items:center;
        display:none;
        padding:15px 0;
        box-shadow:0 5px 15px rgba(0,0,0,.1);
    }

    .nav-links.active{
        display:flex;
    }

    .auth{
        display:none;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">SmartEdu</div>

    <div class="menu-toggle" id="menuToggle">☰</div>

    <ul class="nav-links" id="navLinks">
        <li><a href="#">Home</a></li>
        <li><a href="{{ url_for('LPcourse')}}">Course</a></li>
        <li><a href="{{ url_for('LPbookstore')}}">Book Store</a></li>
        <li><a href="#">Reviews</a></li>
    </ul>

    <div class="auth">
        <button class="login" onclick="openLogin()">Login</button>
        <a class="signup" href="{{url_for('LPregisteryourself')}}">Sign Up</a>
    </div>
</nav>

<!-- REGISTER FORM -->
<div class="register-container">
<h2>Create Account</h2>

<form method="POST" action="/register">
{% if error %}
<p style="color:red; font-size:14px;">{{ error }}</p>
{% endif %}

<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="password" name="password" placeholder="Password" required>
<input type="password" name="confirm_password" placeholder="Confirm Password" required>

<select name="role" required>
<option value="">Register As</option>
<option value="Student">Student</option>
<option value="Teacher">Teacher</option>
</select>

<input type="text" name="phone" placeholder="Phone Number" required>

<button type="submit">Register</button>
</form>

<div class="register-links">
<p>Already have an account?
<a href="{{url_for('LPfront')}}">Login</a></p>
</div>
</div>

<!-- JS -->
<script>
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});

// Dummy function (you can connect your modal/login page)
function openLogin(){
    window.location.href = "{{url_for('LPfront')}}";
}
</script>

</body>
</html>
