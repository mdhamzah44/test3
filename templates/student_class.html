{% if not invalid %}

<div class="class-wrapper" id="appContainer">

    

    <div class="class-grid">

        <!-- LEFT -->
        <div class="left-panel">

            <div class="canvas-area">

                <video id="videoPlayer">
                    <source src="/static/sample.mp4" type="video/mp4">
                </video>

                <!-- OVERLAY -->
                 <button class="back-btn" onclick="goBack()">⬅ Back</button>
                <div class="overlay-info">
                    <h1>{{ cls.subject }}</h1>
                    <p>{{ teacher_name }} | {{ cls.date }} | {{ cls.time }}</p>
                </div>

                <!-- TIMER -->
                <div class="start-timer" id="startTimer"></div>

            </div>

            <div class="controls" id="controlsBar"></div>

        </div>

        <!-- RIGHT -->
        <div class="right-panel">

            <div class="teacher-video">
                
              <video id="studentVideo" autoplay playsinline muted></video>
            </div>

            <div class="chat-box">
                <h4>Live Chat</h4>
               <div class="messages" id="chatMessages"></div>
               
            </div>
 <div class="chat-input">
                    <input type="text" placeholder="Ask doubt...">
                    <button>Send</button>
                </div>
        </div>

    </div>
</div>

{% else %}

<!-- ❌ INVALID SCREEN -->
<div class="invalid-screen" id="invalidScreen">
    ❌ Invalid Class <br>
    Redirecting in 10s...
</div>

{% endif %}

<style>

/* COMMON */
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
}

/* INVALID SCREEN */
.invalid-screen{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    text-align:center;
}

/* MAIN UI */
.class-wrapper{
    height:100vh;
    display:flex;
    flex-direction:column;
}

.class-header{
    padding:10px 20px;
    background:#020617;
}

.class-grid{
    flex:1;
    display:grid;
    grid-template-columns:3fr 1fr;
    gap:10px;
    padding:10px;
}

.left-panel{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.canvas-area{
    flex:1;
    position:relative;
    background:black;
    border-radius:12px;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* HOVER INFO */
.overlay-info{
    position:absolute;
    bottom:30px;
    left:30px;
    opacity:0;
    transition:0.3s;
}
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    padding:8px 12px;
    background:rgba(0,0,0,0.7);
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    opacity:0;
    transition:0.3s;
}

/* Show on hover */
.canvas-area:hover .back-btn{
    opacity:1;
}

.canvas-area:hover .overlay-info{
    opacity:1;
}

/* TIMER */
.start-timer{
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:8px;
    display:none;
}

/* CONTROLS */
.controls{
    height:60px;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.ctrl-btn{
    padding:8px 12px;
    background:#1e293b;
    border:none;
    color:white;
    border-radius:6px;
}

/* RIGHT */
.right-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    height: 100%;     /* or 100vh depending on parent */
    overflow: hidden; /* 🔥 prevents expansion */
}

.teacher-video {
    height: 200px;
    background: black;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0; /* 🔥 prevents shrinking */
}
.teacher-video, .chat-box{ 
    background:#020617; 
    padding:10px; 
    border-radius:10px; 
    overflow-x: scroll; 
    max-height: 550px; 
    scrollbar-width: none; 
    scroll-behavior:initial; }


.video-box{
    height:120px;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
}

.chat-box {
    background: #020617;
    padding: 10px;
    border-radius: 10px;

    flex: 1;
    display: flex;
    flex-direction: column;

    min-height: 0;     /* 🔥 CRITICAL */
    overflow: hidden;  /* 🔥 stops expansion */
}

/* 🔥 THIS is the real scroll area */
.messages {
    flex: 1;
    overflow-y: auto;

    min-height: 0;  /* 🔥 CRITICAL FIX */
    scrollbar-width: none;
}
/* optional scrollbar hide */
.messages::-webkit-scrollbar {
    display: none;
}

.message{
    margin-bottom:10px;
    padding:8px;
    border-radius:8px;
    background:#1e293b;
}

.message.teacher{
    background:#1d4ed8; /* 🔵 Teacher highlight */
}

.message .meta{
    font-size:12px;
    opacity:0.7;
    margin-bottom:4px;
}

.message .text{
    font-size:14px;
}

.chat-input{
    display:flex;
    gap:5px;
}

.chat-input input{
    flex:1;
    padding:6px;
}

.chat-input button{
    padding:6px;
    background:#2563eb;
    color:white;
    border:none;
}

</style>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();
const classId = "{{ cls.class_id }}";

const video = document.getElementById("studentVideo");
const chatBox = document.getElementById("chatMessages");
const input = document.querySelector(".chat-input input");
const sendBtn = document.querySelector(".chat-input button");

let pc;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

/* =========================
   🔗 JOIN ROOM
========================= */
socket.emit("join-room", { class_id: classId });

/* =========================
   📩 RECEIVE OFFER
========================= */
socket.on("offer", async data => {

    pc = new RTCPeerConnection(config);

    pc.ontrack = e => {
        const stream = e.streams[0];

        video.srcObject = null;
        video.srcObject = stream;

        video.muted = true;
        video.autoplay = true;
        video.playsInline = true;

        video.onloadedmetadata = () => {
            video.play().catch(()=>{});
        };
    };

    pc.onicecandidate = e => {
        if(e.candidate){
            socket.emit("ice-candidate", {
                candidate: e.candidate,
                to: data.from,
                class_id: classId
            });
        }
    };

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("answer", {
        answer: answer,
        to: data.from,
        class_id: classId
    });
});

/* =========================
   ❄️ RECEIVE ICE
========================= */
socket.on("ice-candidate", async data => {
    if(pc && data.candidate){
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    }
});

/* =========================
   🎥 VIDEO CONTROLS
========================= */
const isInvalid = {{ invalid | tojson }};

if(!isInvalid){

    const videoPlayer = document.getElementById("videoPlayer");
    const controls = document.getElementById("controlsBar");
    const timerBox = document.getElementById("startTimer");

    function renderControls(){
        controls.innerHTML = `
            <button class="ctrl-btn" onclick="togglePlay()">▶️</button>
            <button class="ctrl-btn" onclick="volumeDown()">🔉</button>
            <button class="ctrl-btn" onclick="volumeUp()">🔊</button>
        `;
    }

    window.togglePlay = function(){
        videoPlayer.paused ? videoPlayer.play() : videoPlayer.pause();
    }

    window.volumeUp = function(){
        videoPlayer.volume = Math.min(1, videoPlayer.volume + 0.1);
    }

    window.volumeDown = function(){
        videoPlayer.volume = Math.max(0, videoPlayer.volume - 0.1);
    }

    function startClassTimer(classTimeStr){

        const [h,m] = classTimeStr.split(":");
        const classTime = new Date();
        classTime.setHours(h,m,0,0);

        function update(){
            const diff = classTime - new Date();

            if(diff <= 0){
                timerBox.style.display="none";
                return;
            }

            const min = diff/60000;

            if(min <= 20){
                timerBox.style.display="block";

                const mins = Math.floor(diff/60000);
                const secs = Math.floor((diff%60000)/1000);

                timerBox.innerText =
                    `Class starts in ${mins}:${secs.toString().padStart(2,'0')}`;
            }
        }

        update();
        setInterval(update,1000);
    }

    renderControls();
    startClassTimer("{{ cls.time }}");
}

/* =========================
   💬 CHAT SYSTEM
========================= */
const displayedJoins = new Set();

async function loadComments(){

    const res = await fetch(`/get-comments/${classId}`);
    const data = await res.json();

    chatBox.innerHTML = "";

    data.forEach(c => {

        const div = document.createElement("div");

        if(c.type === "join"){

            if(!displayedJoins.has(c.id)){
                displayedJoins.add(c.id);

                div.classList.add("message");
                div.style.background = "#334155";
                div.style.textAlign = "center";

                div.innerHTML = `
                    <div class="meta">${c.time}</div>
                    <div class="text">👋 ${c.text}</div>
                `;

                chatBox.appendChild(div);
            }

            return;
        }

        div.classList.add("message");

        if(c.role === "Teacher"){
            div.classList.add("teacher");
        }

        div.innerHTML = `
            <div class="meta">${c.name} • ${c.time}</div>
            <div class="text">${c.text}</div>
        `;

        chatBox.appendChild(div);
    });

    /* 🔥 ALWAYS SCROLL TO LATEST */
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* =========================
   ✉️ SEND MESSAGE
========================= */
async function sendComment(){

    const text = input.value.trim();
    if(!text) return;

    await fetch("/add-comment", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            class_id: classId,
            text: text
        })
    });

    input.value = "";
    loadComments();
}

/* =========================
   🎯 EVENTS
========================= */
sendBtn.onclick = sendComment;

input.addEventListener("keypress", e=>{
    if(e.key === "Enter") sendComment();
});

/* =========================
   🔄 AUTO REFRESH
========================= */
setInterval(loadComments, 2000);

/* =========================
   🚀 INITIAL LOAD (SCROLL FIX)
========================= */
window.onload = () => {
    loadComments(); // load + auto scroll inside it
};

/* =========================
   👋 MARK JOIN
========================= */
async function markJoin(){
    await fetch("/join-class", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            class_id: classId
        })
    });
}

markJoin();

/* =========================
   🔍 DEBUG VIDEO
========================= */
setInterval(() => {
    if(video.srcObject){
        const vTrack = video.srcObject.getVideoTracks()[0];
        console.log("Video muted:", vTrack.muted);
        console.log("Video readyState:", vTrack.readyState);
    }
}, 2000);

/* =========================
   🔙 BACK BUTTON FIX
========================= */
history.pushState(null,null,location.href);
window.onpopstate = () => location.href="/";

function goBack(){
    window.location.href = "/LPstudenthome";
}
</script>
