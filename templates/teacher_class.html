<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Live Class</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body style="margin:0;background:#0f172a;color:white;font-family:sans-serif;">

<div style="padding:10px;background:#020617;">
    <h2>Live Teaching Mode</h2>
</div>

<div style="display:flex;height:90vh;">

    <!-- LEFT (CAMERA) -->
    <div style="flex:3;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="teacherVideo" autoplay playsinline style="width:90%;border-radius:12px;"></video>

        <div style="margin-top:10px;">
            <button onclick="startStream()">Start Camera</button>
        </div>
    </div>

    <!-- RIGHT -->
    <div style="flex:1;background:#020617;padding:10px;">
        <h3>Students Connected</h3>
        <div id="log"></div>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();
const classId = "{{ cls.class_id }}";

const video = document.getElementById("teacherVideo");

let localStream;
let peerConnections = {};

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

/* JOIN ROOM */
socket.emit("join-room", { class_id: classId });

/* AUTO START CAMERA */
window.onload = async () => {
    await startStream();
};

async function startStream(){
    try{
        localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        // 🔥 FIX: ensure video is active
        localStream.getVideoTracks().forEach(track => {
            track.enabled = true;
        });

        video.srcObject = localStream;
        console.log("🎥 Camera started");

    }catch(err){
        console.error("Camera error:", err);
    }
}

/* STUDENT JOINED */
socket.on("user-joined", async (data) => {

    if(!data || !data.user_id){
        console.log("Invalid join data:", data);
        return;
    }

    const studentId = data.user_id;

    if(!localStream){
        console.log("⏳ Camera not ready yet");
        return;
    }

    const pc = new RTCPeerConnection(config);
    peerConnections[studentId] = pc;

    /* SEND TRACKS */
    localStream.getTracks().forEach(track=>{
        pc.addTrack(track, localStream);
    });

    console.log("🎥 Tracks sent to", studentId);

    /* ICE */
    pc.onicecandidate = e=>{
        if(e.candidate){
            socket.emit("ice-candidate", {
                candidate: e.candidate,
                to: studentId,
                class_id: classId
            });
        }
    };

    /* CREATE OFFER */
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("offer", {
        offer: offer,
        to: studentId,
        class_id: classId
    });

    console.log("📤 Offer sent to", studentId);
});

/* RECEIVE ANSWER */
socket.on("answer", async data => {

    const studentId = data.from;
    const pc = peerConnections[studentId];

    if(pc){
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        console.log("✅ Answer received from", studentId);
    }
});

/* RECEIVE ICE */
socket.on("ice-candidate", async data => {

    const studentId = data.from;
    const pc = peerConnections[studentId];

    if(pc && data.candidate){
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    }
});


</script>

</body>
</html>
